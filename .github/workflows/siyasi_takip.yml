name: Siyasi Takip

on:
  schedule:
    - cron: '59 20 * * *'   # Her gece 23:59 Türkiye saati (UTC+3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  siyasi-takip:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install -r requirements.txt

      - name: Siyasi paylaşımları çek
        run: python siyasi_takip.py

      - name: Değişiklikleri kaydet ve push et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mertdmg/
          git diff --staged --quiet || git commit -m "Siyasi takip güncellendi: $(date +'%d.%m.%Y')"
          git pull --rebase origin main
          git push
