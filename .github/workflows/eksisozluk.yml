name: Ekşi Sözlük Gündem

on:
  schedule:
    - cron: '53 20 * * *'  # Her gece 23:53 Türkiye saati (UTC+3)
  workflow_dispatch:        # Elle de çalıştırılabilir

permissions:
  contents: write

jobs:
  eksisozluk-cek:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install -r requirements.txt

      - name: Ekşi Sözlük gündem çek
        run: python eksisozluk_cek.py

      - name: Değişiklikleri kaydet ve push et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mertdmg/
          git diff --staged --quiet || git commit -m "Ekşi Sözlük güncellendi: $(date +'%d.%m.%Y')"
          git pull --rebase origin main
          git push
